<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#ffffff">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ======================================================
       SIDEBAR — list navigation
  ====================================================== -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="logo">✦ Todo</span>
      <button id="btn-new-list" title="Nuova lista">+</button>
    </div>
    <ul id="lists-nav" role="list"></ul>
    <div id="sidebar-footer">
      <button id="btn-home" title="Tutte le liste">⊞ Tutte le liste</button>
      <button id="btn-timeline" title="Vista agenda">≋ Agenda</button>
      <div class="auth-controls">
        <button id="btn-login" title="Accedi con Google">Login</button>
        <button id="btn-logout" class="hidden" title="Esci">Logout</button>
      </div>
    </div>
  </aside>

  <!-- ======================================================
       MAIN AREA
  ====================================================== -->
  <main id="main">

    <!-- Homepage -->
    <section id="homepage" class="hidden">
      <header id="home-header">
        <h1>Le mie liste</h1>
        <button id="btn-new-list-home">+ Nuova lista</button>
      </header>
      <div id="home-cards"></div>
    </section>

    <!-- List view -->
    <section id="list-view" class="hidden">
      <header id="list-header">
        <div id="list-title-row">
          <input id="list-title-input" type="text" placeholder="Nome lista…" autocomplete="off" />
          <button id="btn-star" title="Segna come preferita">☆</button>
          <button id="btn-delete-list" title="Elimina lista">🗑</button>
        </div>
        <div id="add-task-row">
          <input id="task-input" type="text" placeholder="Aggiungi un task e premi Invio…" autocomplete="off" />
          <button id="btn-add-task">Aggiungi</button>
        </div>
      </header>
      <ul id="task-list" role="list"></ul>
    </section>

    <!-- Timeline / Agenda view: all tasks sorted by planned period -->
    <section id="timeline-view" class="hidden">
      <header id="timeline-header">
        <h1>Agenda</h1>
        <label class="toggle-completed-label">
          <input type="checkbox" id="toggle-show-completed" />
          Mostra completati
        </label>
      </header>
      <div id="timeline-content"></div>
    </section>

    <div id="loading">Caricamento…</div>
  </main>

  <!-- ======================================================
       TASK DETAIL PANEL
  ====================================================== -->
  <aside id="detail-panel" class="hidden" role="complementary" aria-label="Dettagli task">
    <div id="detail-inner">

      <button id="btn-close-detail">✕</button>
      <h2 id="detail-task-title"></h2>

      <!-- OVERDUE WARNING — shown when task was auto-advanced -->
      <div id="detail-overdue-bar" class="hidden"></div>

      <!-- ================================================
           PLANNING SECTION (NEW)
           deadline + planned period
      ================================================ -->
      <div class="detail-section planning-section">
        <div class="detail-section-title">Pianificazione</div>

        <!-- Quando voglio farlo -->
        <div class="planning-field">
          <label for="detail-period">Quando voglio farlo</label>
          <!-- Options populated by JS from PERIODS array -->
          <select id="detail-period"></select>
        </div>

        <!-- Scadenza -->
        <div class="planning-field">
          <label for="detail-deadline">Scadenza</label>
          <div class="deadline-input-row">
            <input id="detail-deadline" type="date" />
            <button id="btn-clear-deadline" title="Rimuovi scadenza">✕</button>
          </div>
          <span id="detail-deadline-status" class="deadline-status"></span>
        </div>
      </div>

      <!-- Notes -->
      <div class="detail-section">
        <label for="detail-notes">Note / Specifiche</label>
        <textarea id="detail-notes" placeholder="Aggiungi note dettagliate, specifiche, link…"></textarea>
      </div>

      <div id="detail-actions">
        <button id="btn-complete-task">Segna completo</button>
        <button id="btn-delete-task" class="danger">Elimina task</button>
      </div>

    </div>
  </aside>

  <div id="overlay" class="hidden"></div>

  <!-- ======================================================
       MODAL — new list
  ====================================================== -->
  <div id="modal-backdrop" class="hidden">
    <div id="modal">
      <h3>Nuova lista</h3>
      <input id="modal-list-name" type="text" placeholder="Nome lista…" autocomplete="off" />
      <div id="modal-actions">
        <button id="btn-modal-cancel">Annulla</button>
        <button id="btn-modal-create">Crea</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs (v8 compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>

  <!-- AUTH OVERLAY -->
  <div id="auth-overlay" class="hidden">
    <div class="auth-box">
      <h2>Accedi per usare Todo</h2>
      <p>Effettua il login con Google per sincronizzare le tue liste.</p>
      <button id="overlay-login">Accedi con Google</button>
    </div>
  </div>

</body>
</html>
